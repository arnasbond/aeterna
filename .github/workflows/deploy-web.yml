name: Deploy Web to Vercel

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Vercel Deploy Hook
        if: ${{ secrets.VERCEL_DEPLOY_HOOK != '' }}
        run: curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"

      - name: Hint if hook missing
        if: ${{ secrets.VERCEL_DEPLOY_HOOK == '' }}
        run: |
          echo "Add repo secret VERCEL_DEPLOY_HOOK (Vercel → Project → Settings → Git → Deploy Hook URL)"
          echo "Or: Vercel Dashboard → aeterna → Deployments → Redeploy → Production"
